kind: Service
apiVersion: v1
metadata:
  name: {{ .Values.appName }}
spec:
  selector:
    app: {{ .Values.appName }}
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: {{ .Values.service.type }} # Change to LoadBalancer for Service. Lecture 62
  # type: ClusterIP # Change to ClusterIP for Ingress. Lecture 63